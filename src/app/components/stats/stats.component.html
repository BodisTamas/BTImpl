<div class="container">
  <div class="stats-bar surface-card row row-cols-1 row-cols-sm-3 g-3 g-sm-0 p-4">
    @for (stat of stats(); track stat.label) {
      <div class="stat-item col text-center py-2">
        <div class="stat-num">{{ stat.value }}</div>
        <div class="stat-label mt-1">{{ stat.label }}</div>
      </div>
    }
  </div>
</div>
