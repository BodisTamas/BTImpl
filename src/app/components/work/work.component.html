@if (publications().length > 0) {
<section id="publications" class="container py-5">
  <div class="mb-4">
    <span class="section-label">// {{ text().nav.publications }}</span>
  </div>

  <div class="row g-4">
    @for (item of publications(); track item.title) {
      <div class="col-12 col-md-6">
        <div class="hub-card h-100 p-4">
          <span class="tag mb-3" [class.accent]="item.accent">{{ item.tag }}</span>
          <h4 class="mb-3">{{ item.title }}</h4>
          <p class="mb-4">{{ item.description }}</p>
          <a href="#contact" class="read-more">{{ item.linkText }} →</a>
        </div>
      </div>
    }
  </div>
</section>
}
