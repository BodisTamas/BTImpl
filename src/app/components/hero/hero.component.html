<header class="hero d-flex flex-column align-items-center text-center px-3">
  <div class="d-flex flex-column flex-sm-row align-items-center gap-4 mb-4 mt-4">
    <app-logo [height]="104" />
    <div class="d-flex flex-column align-items-center align-items-sm-start">
      <div class="brand">{{ profile().brand }}</div>
      <div class="tagline mt-2">{{ profile().tagline }}</div>
    </div>
  </div>

  <div class="d-flex flex-wrap justify-content-center gap-3 mb-5">
    <a class="btn btn-primary btn-brand d-inline-flex align-items-center gap-2 px-4 py-3 rounded-3" href="#contact">
      <app-icon name="mail" [size]="16" />
      {{ text().hero.ctaPrimary }}
    </a>
    <a class="btn btn-outline-brand d-inline-flex align-items-center px-4 py-3 rounded-3" href="#projects">{{ text().hero.ctaSecondary }}</a>
  </div>
</header>
